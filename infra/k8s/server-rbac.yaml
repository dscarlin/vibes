apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vibes-admin-metrics-read
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vibes-admin-metrics-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vibes-admin-metrics-read
subjects:
  - kind: ServiceAccount
    name: vibes-server-sa
    namespace: vibes-platform
