apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibes-web
  namespace: vibes-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibes-web
  template:
    metadata:
      labels:
        app: vibes-web
    spec:
      containers:
        - name: web
          image: ${WEB_IMAGE}
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: vibes-web-env
