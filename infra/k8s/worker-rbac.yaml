apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: worker-deployer
rules:
  - apiGroups: [""]
    resources: ["secrets","services","configmaps","namespaces","pods","pods/log","pods/status","nodes"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["apps"]
    resources: ["deployments","deployments/scale"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get","list","watch","create","update","patch","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: worker-deployer
subjects:
  - kind: ServiceAccount
    name: worker-sa
    namespace: vibes-platform
roleRef:
  kind: ClusterRole
  name: worker-deployer
  apiGroup: rbac.authorization.k8s.io
