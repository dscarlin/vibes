events {}
http {
  # Allow runtime DNS resolution of upstreams so nginx doesn't exit
  # if a container isn't running yet.
  resolver 10.89.0.1 valid=10s;
  resolver_timeout 5s;
  include /etc/nginx/mime.types;
  client_max_body_size 100M;
  sendfile on;
  server_tokens off;
  server {
    listen 80 default_server;
    server_name _;
    return 404;
  }
  include /etc/nginx/conf.d/*.conf;
}
