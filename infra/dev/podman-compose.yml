version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibes
    ports:
      - "5433:5432"
    volumes:
      - vibes_dev_db:/var/lib/postgresql/data
    networks:
      - vibes-net
  nginx:
    image: nginx:1.27
    container_name: vibes-nginx
    ports:
      - "8001:80"
    volumes:
      - ${HOME}/.vibes/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/.vibes/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - db
    networks:
      - vibes-net
volumes:
  vibes_dev_db:
networks:
  vibes-net:
    name: vibes-net
