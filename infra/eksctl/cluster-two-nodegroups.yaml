apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: vibes-platform
  region: us-east-1
  tags:
    app: vibes
    env: dev

managedNodeGroups:
  - name: platform-core
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    labels:
      nodegroup: platform
      role: platform
    volumeSize: 20
  - name: customer-apps
    instanceType: t3.small
    desiredCapacity: 0
    minSize: 0
    maxSize: 4
    labels:
      nodegroup: customer
      role: customer
    taints:
      - key: nodegroup
        value: customer
        effect: NoSchedule
    volumeSize: 20
